<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dividi Scontrino Auto</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2C1810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scontrino">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --cream: #F5EFE0;
    --parchment: #EDE3CC;
    --terracotta: #C4622D;
    --terra-dark: #9E4A1E;
    --terra-light: #E8885A;
    --ink: #2C1810;
    --ink-mid: #5C3D2E;
    --ink-light: #9B7B6A;
    --wine: #722F37;
    --wine-light: #C25E6E;
    --wine-pale: #F5E6E8;
    --green: #3A6B4A;
    --green-pale: #E6F0E8;
    --gold: #C9A84C;
    --white: #FDFAF4;
    --shadow: 0 4px 24px rgba(44,24,16,0.12);
    --shadow-sm: 0 2px 8px rgba(44,24,16,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(196,98,45,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(114,47,55,0.06) 0%, transparent 50%);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: var(--ink);
    padding: 20px 20px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(255,255,255,0.015) 20px,
      rgba(255,255,255,0.015) 21px
    );
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    color: var(--cream);
    letter-spacing: 0.02em;
    position: relative;
  }
  header h1 span {
    color: var(--terra-light);
  }
  header p {
    font-size: 0.75rem;
    color: var(--ink-light);
    margin-top: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    position: relative;
  }
  .header-deco {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
    position: relative;
  }
  .header-deco span {
    height: 1px;
    width: 40px;
    background: var(--terracotta);
    opacity: 0.6;
  }
  .header-deco em {
    color: var(--gold);
    font-style: normal;
    font-size: 1rem;
  }

  .container { max-width: 480px; margin: 0 auto; padding: 0 16px; }

  /* === UPLOAD SECTION === */
  .section {
    background: var(--white);
    border-radius: 16px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(196,98,45,0.1);
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--ink);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .num {
    background: var(--terracotta);
    color: white;
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 0.7rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .upload-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 14px 8px;
    background: var(--cream);
    border: 2px dashed rgba(196,98,45,0.3);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .upload-btn:active {
    transform: scale(0.97);
    background: var(--parchment);
  }
  .upload-btn .icon {
    font-size: 1.8rem;
    line-height: 1;
  }
  .upload-btn .label {
    font-size: 0.68rem;
    font-weight: 500;
    color: var(--ink-mid);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .upload-btn input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    font-size: 100px;
  }
  .upload-btn:hover {
    border-color: var(--terracotta);
    background: rgba(196,98,45,0.04);
  }

  .divider {
    text-align: center;
    color: var(--ink-light);
    font-size: 0.75rem;
    margin: 14px 0 10px;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 35%;
    height: 1px;
    background: var(--parchment);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .demo-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1.5px solid var(--parchment);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .demo-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .demo-btn:active { transform: scale(0.98); }

  /* === STATUS === */
  .status-bar {
    display: none;
    background: var(--ink);
    color: var(--cream);
    border-radius: 12px;
    padding: 12px 16px;
    margin-top: 16px;
    font-size: 0.82rem;
    align-items: center;
    gap: 10px;
  }
  .status-bar.visible { display: flex; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(245,239,224,0.2);
    border-top-color: var(--terra-light);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === ROWS TABLE === */
  .rows-section { display: none; }
  .rows-section.visible { display: block; }

  .row-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1px solid var(--parchment);
    animation: fadeIn 0.3s ease both;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
  .row-item:last-child { border-bottom: none; }

  .row-desc {
    flex: 1;
    font-size: 0.85rem;
    color: var(--ink);
    background: transparent;
    border: none;
    font-family: 'DM Sans', sans-serif;
    padding: 4px 6px;
    border-radius: 6px;
    min-width: 0;
  }
  .row-desc:focus {
    outline: none;
    background: var(--cream);
  }

  .row-price {
    width: 64px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink);
    background: transparent;
    border: none;
    font-family: 'DM Sans', sans-serif;
    text-align: right;
    padding: 4px 4px;
    border-radius: 6px;
  }
  .row-price:focus {
    outline: none;
    background: var(--cream);
  }

  .tag-btn {
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tag-wine { background: var(--wine-pale); color: var(--wine); }
  .tag-wine:active, .tag-wine.active { background: var(--wine); color: white; }
  .tag-food { background: var(--green-pale); color: var(--green); }
  .tag-food:active, .tag-food.active { background: var(--green); color: white; }

  .uncertain-row .row-desc,
  .uncertain-row .row-price {
    background: #FFF8E1;
    border-radius: 6px;
  }
  .uncertain-badge {
    font-size: 0.6rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .delete-row {
    background: none;
    border: none;
    color: var(--ink-light);
    cursor: pointer;
    font-size: 0.9rem;
    padding: 2px 4px;
    border-radius: 4px;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .delete-row:hover { color: var(--terracotta); }

  .add-row-btn {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1.5px dashed var(--parchment);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--ink-light);
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .add-row-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }

  /* === RIEPILOGO === */
  .riepilogo { display: none; }
  .riepilogo.visible { display: block; }

  .totals-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .total-card {
    padding: 14px;
    border-radius: 12px;
    text-align: center;
  }
  .total-card.wine { background: var(--wine-pale); }
  .total-card.food { background: var(--green-pale); }
  .total-card .label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .total-card.wine .label { color: var(--wine); }
  .total-card.food .label { color: var(--green); }
  .total-card .value {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
  }
  .total-card.wine .value { color: var(--wine); }
  .total-card.food .value { color: var(--green); }

  .persona-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .persona-card {
    background: var(--cream);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1.5px solid transparent;
    transition: border-color 0.2s;
  }
  .persona-card.A { border-color: rgba(196,98,45,0.25); }
  .persona-card.B { border-color: rgba(114,47,55,0.25); }
  .persona-card.C { border-color: rgba(58,107,74,0.25); }

  .persona-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }
  .A .persona-avatar { background: var(--terracotta); }
  .B .persona-avatar { background: var(--wine); }
  .C .persona-avatar { background: var(--green); }

  .persona-info { flex: 1; }
  .persona-name {
    font-weight: 500;
    font-size: 0.85rem;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .persona-breakdown {
    font-size: 0.7rem;
    color: var(--ink-light);
  }
  .persona-total {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--ink);
  }

  .grand-total {
    background: var(--ink);
    color: var(--cream);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }
  .grand-total .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-light);
  }
  .grand-total .value {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--gold);
  }

  .calcola-btn {
    width: 100%;
    padding: 15px;
    background: var(--terracotta);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: 0.02em;
  }
  .calcola-btn:active { transform: scale(0.99); background: var(--terra-dark); }
  .calcola-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .reset-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1.5px solid var(--parchment);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .reset-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }

  .legend {
    font-size: 0.7rem;
    color: var(--ink-light);
    text-align: center;
    margin-top: 16px;
    line-height: 1.6;
    padding: 10px 14px;
    background: var(--cream);
    border-radius: 10px;
  }
  .legend strong { color: var(--ink-mid); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--cream);
    padding: 10px 18px;
    border-radius: 24px;
    font-size: 0.8rem;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .rows-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .rows-count {
    font-size: 0.72rem;
    color: var(--ink-light);
    background: var(--cream);
    padding: 3px 8px;
    border-radius: 10px;
  }

  .image-preview {
    width: 100%;
    max-height: 160px;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 12px;
    display: none;
  }
  .image-preview.visible { display: block; }
</style>
</head>
<body>

<header>
  <h1>🍽 Dividi <span>Scontrino</span> Auto</h1>
  <p>Divisione automatica del conto</p>
  <div class="header-deco">
    <span></span>
    <em>🍷</em>
    <span></span>
  </div>
</header>

<div class="container">

  <!-- STEP 1: Upload -->
  <div class="section">
    <div class="section-title">
      <span class="num">1</span>
      Carica lo scontrino
    </div>
    <div class="upload-grid">
      <div class="upload-btn">
        <span class="icon">📄</span>
        <span class="label">PDF</span>
        <input type="file" accept="application/pdf" id="pdfInput" onchange="handleFile(this,'pdf')">
      </div>
      <div class="upload-btn">
        <span class="icon">🖼</span>
        <span class="label">Immagine</span>
        <input type="file" accept="image/*" id="imgInput" onchange="handleFile(this,'image')">
      </div>
      <div class="upload-btn">
        <span class="icon">📷</span>
        <span class="label">Foto</span>
        <input type="file" accept="image/*" capture="environment" id="camInput" onchange="handleFile(this,'image')">
      </div>
    </div>
    <img id="imgPreview" class="image-preview">
    <div class="divider">oppure</div>
    <button class="demo-btn" onclick="loadDemo()">🧾 Carica scontrino di esempio</button>
    <button class="demo-btn" style="margin-top:8px;border-color:rgba(196,98,45,0.3)" onclick="promptApiKey();showToast('API key salvata ✓')">🔑 Imposta API key Anthropic</button>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Elaborazione in corso…</span>
  </div>

  <!-- STEP 2: Rows -->
  <div class="section rows-section" id="rowsSection">
    <div class="section-title">
      <span class="num">2</span>
      Voci estratte
    </div>
    <div class="rows-header">
      <span style="font-size:0.72rem;color:var(--ink-light)">Tocca per modificare · 🍷 = vino · 🥗 = cibo</span>
      <span class="rows-count" id="rowsCount">0 voci</span>
    </div>
    <div id="rowsList"></div>
    <button class="add-row-btn" onclick="addEmptyRow()">＋ Aggiungi voce manuale</button>
    <button class="calcola-btn" style="margin-top:16px" onclick="calcola()">
      🔢 Calcola divisione
    </button>
  </div>

  <!-- STEP 3: Results -->
  <div class="section riepilogo" id="riepilogo">
    <div class="section-title">
      <span class="num">3</span>
      Riepilogo
    </div>
    <div class="totals-grid" id="totalsGrid"></div>
    <div class="persona-cards" id="personaCards"></div>
    <div class="grand-total" id="grandTotal"></div>
    <div class="legend">
      <strong>A & B</strong> pagano: cibo ÷ 3 + vino ÷ 2 &nbsp;·&nbsp;
      <strong>C</strong> paga: solo cibo ÷ 3
    </div>
    <button class="reset-btn" onclick="reset()">🔄 Riparti da capo</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── PDF.js worker ──
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ──
let rows = []; // {desc, price, isWine, uncertain}

// ── WINE KEYWORDS ──
const WINE_KW = [
  'vino','wine','rosso','bianco','rosé','rose','prosecco','champagne','spumante',
  'bollicin','brunello','barolo','chianti','merlot','cabernet','sangiovese',
  'pinot','sauvignon','riesling','vermentino','grappa','amaro','aperol','spritz',
  'birra','beer','birre','mojito','cocktail','aperitivo','digestivo','limoncello',
  'rum','gin','vodka','whisky','whiskey','cognac','calvados','porto','sherry',
  'bottigl','bottiglia','cl','lt','calice','bicchiere','quartino','carafa',
  '1/4','1/2','mezzo litro','litro','lt.'
];
const WINE_PRICE_HINTS = ['vn','vno','vns','vin','wn','bir','brr','sprt'];

function guessWine(desc) {
  const d = (desc||'').toLowerCase();
  const direct = WINE_KW.some(k => d.includes(k));
  const abbr = WINE_PRICE_HINTS.some(k => d.startsWith(k));
  if (direct) return {isWine: true, uncertain: false};
  if (abbr) return {isWine: true, uncertain: true};
  return {isWine: false, uncertain: false};
}

// ── RECEIPT TEXT PARSER ──
function parseReceiptText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const parsed = [];

  // Patterns for price
  const priceRe = /(\d{1,3}[.,]\d{2})\s*[€$]?$/;
  const altRe   = /[€$]\s*(\d{1,3}[.,]\d{2})/;
  const skipRe  = /^(tot|total|subtot|iva|tax|ivato|scont|discount|coperto|servizio|serviz|servic|resto|cash|carta|contant|pagato|pagam|change|receipt|scontr|benven|grazie|welcome|thank|ticket|data|ora|tavol|table|cassa|operatore|operato|partita|p\.iva|cod\.|via |tel|www\.|http)/i;

  for (const line of lines) {
    if (line.length < 3) continue;
    if (skipRe.test(line)) continue;
    if (/^[*=-]{3,}/.test(line)) continue;

    let price = null;
    let desc = line;

    let m = line.match(priceRe);
    if (m) {
      price = parseFloat(m[1].replace(',','.'));
      desc = line.slice(0, line.lastIndexOf(m[0])).trim();
    } else {
      m = line.match(altRe);
      if (m) {
        price = parseFloat(m[1].replace(',','.'));
        desc = line.replace(altRe,'').trim();
      }
    }

    if (!price || price <= 0 || price > 500) continue;
    if (!desc || desc.length < 2) continue;

    const g = guessWine(desc);
    parsed.push({ desc: capitalize(desc), price, isWine: g.isWine, uncertain: g.uncertain });
  }
  return parsed;
}

function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
}

// ── FILE HANDLER ──
async function handleFile(input, type) {
  const file = input.files[0];
  if (!file) return;
  showStatus('Lettura file…');

  if (type === 'image') {
    const url = URL.createObjectURL(file);
    const preview = document.getElementById('imgPreview');
    preview.src = url;
    preview.classList.add('visible');
    await processImage(file);
  } else {
    document.getElementById('imgPreview').classList.remove('visible');
    await processPDF(file);
  }
}

async function processPDF(file) {
  try {
    showStatus('Estrazione testo dal PDF…');
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(i => i.str).join('\n') + '\n';
    }

    if (text.replace(/\s/g,'').length > 20) {
      finishParsing(text);
    } else {
      // fallback: render page and OCR
      showStatus('PDF scansionato, analisi con Claude AI…');
      const page = await pdf.getPage(1);
      const vp = page.getViewport({scale: 2});
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
      canvas.toBlob(blob => processImage(blob), 'image/png');
    }
  } catch(e) {
    hideStatus();
    showToast('Errore PDF: ' + e.message);
  }
}

// ── API KEY UI ──
function getApiKey() {
  return localStorage.getItem('claude_api_key') || '';
}
function saveApiKey(k) {
  localStorage.setItem('claude_api_key', k.trim());
}
function promptApiKey() {
  const existing = getApiKey();
  const key = window.prompt(
    'Inserisci la tua API key di Anthropic\n(console.anthropic.com → API Keys)\n\nViene salvata solo nel tuo browser.',
    existing
  );
  if (key !== null) saveApiKey(key);
  return key?.trim() || '';
}

async function processImage(file) {
  let apiKey = getApiKey();
  if (!apiKey) {
    apiKey = promptApiKey();
    if (!apiKey) {
      showManualFallback('Inserisci una API key per usare il riconoscimento automatico.');
      return;
    }
  }

  try {
    showStatus('Lettura immagine con Claude AI…');

    // Convert file to base64
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });

    const mediaType = file.type || 'image/jpeg';

    showStatus('Analisi scontrino in corso…');

    // In locale usa il proxy Python, su GitHub Pages va diretto
    const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    const endpoint = isLocal
      ? 'http://localhost:8765/api/claude'
      : 'https://api.anthropic.com/v1/messages';

    const headers = {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
    };
    if (!isLocal) headers['anthropic-dangerous-direct-browser-access'] = 'true';

    const response = await fetch(endpoint, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: base64 }
            },
            {
              type: 'text',
              text: `Sei un assistente che legge scontrini italiani (ristoranti e supermercati).
Estrai TUTTE le voci con il loro prezzo.
Rispondi SOLO con righe nel formato esatto:
DESCRIZIONE|PREZZO

Regole:
- Una voce per riga
- Prezzo con punto decimale (es: 12.50)
- Escludi totali, subtotali, IVA, coperto se non è un piatto, resto, pagamenti
- Includi coperto, pane, servizio se presenti come voci
- Se una voce è moltiplicata (x2 ecc) metti il totale di quella voce
- Nessun testo aggiuntivo, solo le righe DESCRIZIONE|PREZZO`
            }
          ]
        }]
      })
    });

    if (response.status === 401) {
      hideStatus();
      saveApiKey('');
      showManualFallback('API key non valida. Clicca qui sotto per reinserirla.');
      return;
    }
    if (!response.ok) {
      throw new Error(`API error ${response.status}`);
    }

    const data = await response.json();
    const text = data.content?.map(b => b.text || '').join('\n') || '';
    finishParsingClaude(text);

  } catch(e) {
    hideStatus();
    console.error('Claude Vision error:', e);
    showManualFallback('Errore di rete. Controlla la connessione o inserisci manualmente.');
  }
}

function finishParsingClaude(text) {
  // Parse the DESCRIZIONE|PREZZO format from Claude
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const parsed = [];
  for (const line of lines) {
    const parts = line.split('|');
    if (parts.length < 2) continue;
    const desc = parts[0].trim();
    const price = parseFloat(parts[parts.length-1].replace(',','.'));
    if (!desc || isNaN(price) || price <= 0 || price > 999) continue;
    const g = guessWine(desc);
    parsed.push({ desc: capitalize(desc), price, isWine: g.isWine, uncertain: g.uncertain });
  }
  rows = parsed;
  hideStatus();
  if (rows.length === 0) {
    showManualFallback('Nessuna voce trovata. Inserisci manualmente:');
    return;
  }
  renderRows();
  showToast(`✓ Estratte ${rows.length} voci`);
}

function showManualFallback(msg) {
  const sec = document.getElementById('rowsSection');
  let fb = document.getElementById('manualFallback');
  if (!fb) {
    fb = document.createElement('div');
    fb.id = 'manualFallback';
    fb.style.cssText = 'margin-bottom:14px;';
    const apiKeyRow = getApiKey()
      ? `<button onclick="promptApiKey();showToast('API key aggiornata ✓')" style="margin-top:6px;background:none;border:none;color:var(--terracotta);font-size:0.75rem;cursor:pointer;padding:0;">🔑 Cambia API key</button>`
      : `<button onclick="location.reload()" style="margin-top:6px;background:none;border:none;color:var(--terracotta);font-size:0.75rem;cursor:pointer;padding:0;">🔑 Inserisci API key e riprova</button>`;
    fb.innerHTML = `
      <div id="fallbackMsg" style="background:#FFF8E1;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:0.78rem;color:var(--ink-mid);line-height:1.5;">
        ⚠️ <strong>${msg || 'Inserisci le voci manualmente:'}</strong><br>
        <span style="color:var(--ink-light)">Es: <em>Pasta al pomodoro 9.50</em></span>
        ${apiKeyRow}
      </div>
      <textarea id="manualText" placeholder="Pasta al pomodoro 9.50&#10;Vino rosso 8.00&#10;Acqua 2.50&#10;Tiramisù 5.00" style="width:100%;height:130px;border:1.5px solid var(--parchment);border-radius:10px;padding:10px;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--ink);background:var(--cream);resize:vertical;outline:none;display:block;"></textarea>
      <button onclick="parseManual()" style="margin-top:8px;width:100%;padding:11px;background:var(--terracotta);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.85rem;cursor:pointer;font-weight:500;">
        📋 Analizza testo
      </button>
    `;
    const title = sec.querySelector('.section-title');
    title.after(fb);
  } else {
    const msgEl = fb.querySelector('#fallbackMsg strong');
    if (msgEl && msg) msgEl.textContent = msg;
  }
  fb.style.display = 'block';
  sec.classList.add('visible');
}

function parseManual() {
  const text = document.getElementById('manualText')?.value || '';
  if (!text.trim()) { showToast('Inserisci del testo prima'); return; }
  const fb = document.getElementById('manualFallback');
  if (fb) fb.style.display = 'none';
  finishParsing(text);
}

function finishParsing(text) {
  rows = parseReceiptText(text);
  hideStatus();
  if (rows.length === 0) {
    showManualFallback();
    // Pre-fill the textarea with the raw text so user can see what was extracted
    const ta = document.getElementById('manualText');
    if (ta && text.trim()) ta.value = text.trim();
    showToast('Nessuna voce rilevata — controlla il testo estratto');
    return;
  }
  renderRows();
  showToast(`✓ Estratte ${rows.length} voci`);
}

// ── RENDER ──
function renderRows() {
  const list = document.getElementById('rowsList');
  list.innerHTML = '';
  rows.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'row-item' + (r.uncertain ? ' uncertain-row' : '');
    div.setAttribute('data-i', i);
    div.innerHTML = `
      <input class="row-desc" value="${escHtml(r.desc)}" oninput="updateRow(${i},'desc',this.value)" placeholder="Descrizione">
      <input class="row-price" type="number" step="0.01" min="0" value="${r.price.toFixed(2)}" oninput="updateRow(${i},'price',this.value)">
      <button class="tag-btn ${r.isWine?'tag-wine':'tag-food'} ${r.isWine?'active':''}" onclick="toggleWine(${i})" title="${r.isWine?'Segna come cibo':'Segna come vino'}">
        ${r.isWine?'🍷 Vino':'🥗 Cibo'}
      </button>
      ${r.uncertain ? '<span class="uncertain-badge">?</span>' : ''}
      <button class="delete-row" onclick="deleteRow(${i})" title="Rimuovi">✕</button>
    `;
    list.appendChild(div);
  });
  document.getElementById('rowsCount').textContent = rows.length + ' voci';
  document.getElementById('rowsSection').classList.add('visible');
  document.getElementById('riepilogo').classList.remove('visible');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function updateRow(i, field, val) {
  if (field === 'price') rows[i].price = parseFloat(val)||0;
  else rows[i].desc = val;
}

function toggleWine(i) {
  rows[i].isWine = !rows[i].isWine;
  rows[i].uncertain = false;
  renderRows();
}

function deleteRow(i) {
  rows.splice(i, 1);
  renderRows();
}

function addEmptyRow() {
  rows.push({desc:'', price: 0, isWine: false, uncertain: false});
  renderRows();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.row-desc');
    inputs[inputs.length-1]?.focus();
  }, 50);
}

// ── CALCOLA ──
function calcola() {
  const wine   = rows.filter(r => r.isWine).reduce((s,r)=>s+r.price, 0);
  const food   = rows.filter(r => !r.isWine).reduce((s,r)=>s+r.price, 0);
  const total  = wine + food;

  const foodShare = food / 3;
  const wineShare = wine / 2;

  const A = foodShare + wineShare;
  const B = foodShare + wineShare;
  const C = foodShare;

  // Totals grid
  document.getElementById('totalsGrid').innerHTML = `
    <div class="total-card wine">
      <div class="label">🍷 Totale Vino</div>
      <div class="value">€${wine.toFixed(2)}</div>
    </div>
    <div class="total-card food">
      <div class="label">🥗 Totale Cibo</div>
      <div class="value">€${food.toFixed(2)}</div>
    </div>
  `;

  // Persona cards
  document.getElementById('personaCards').innerHTML = `
    <div class="persona-card A">
      <div class="persona-avatar">A</div>
      <div class="persona-info">
        <div class="persona-name">Persona A</div>
        <div class="persona-breakdown">Cibo €${foodShare.toFixed(2)} + Vino €${wineShare.toFixed(2)}</div>
      </div>
      <div class="persona-total">€${A.toFixed(2)}</div>
    </div>
    <div class="persona-card B">
      <div class="persona-avatar">B</div>
      <div class="persona-info">
        <div class="persona-name">Persona B</div>
        <div class="persona-breakdown">Cibo €${foodShare.toFixed(2)} + Vino €${wineShare.toFixed(2)}</div>
      </div>
      <div class="persona-total">€${B.toFixed(2)}</div>
    </div>
    <div class="persona-card C">
      <div class="persona-avatar">C</div>
      <div class="persona-info">
        <div class="persona-name">Persona C</div>
        <div class="persona-breakdown">Solo cibo €${foodShare.toFixed(2)}</div>
      </div>
      <div class="persona-total">€${C.toFixed(2)}</div>
    </div>
  `;

  document.getElementById('grandTotal').innerHTML = `
    <div>
      <div class="label">Totale Scontrino</div>
      <div style="font-size:0.8rem;color:var(--ink-light);margin-top:2px">${rows.length} voci · A+B+C = €${(A+B+C).toFixed(2)}</div>
    </div>
    <div class="value">€${total.toFixed(2)}</div>
  `;

  document.getElementById('riepilogo').classList.add('visible');
  document.getElementById('riepilogo').scrollIntoView({behavior:'smooth', block:'start'});
}

// ── UTILS ──
function showStatus(msg) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusBar').classList.add('visible');
}
function hideStatus() {
  document.getElementById('statusBar').classList.remove('visible');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3000);
}

function reset() {
  rows = [];
  document.getElementById('rowsSection').classList.remove('visible');
  document.getElementById('riepilogo').classList.remove('visible');
  document.getElementById('imgPreview').classList.remove('visible');
  document.getElementById('imgPreview').src = '';
  document.getElementById('pdfInput').value = '';
  document.getElementById('imgInput').value = '';
  document.getElementById('camInput').value = '';
  window.scrollTo({top:0, behavior:'smooth'});
  showToast('Azzerato ✓');
}
